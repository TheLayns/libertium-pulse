# Empêche la mise en pause du projet Supabase gratuit (~7 jours sans requête).
# La clé utilisée est la clé "anon" : elle est publique par design (déjà dans
# js/config.js) et la RLS garantit qu'elle ne donne accès à aucune donnée.
name: keepalive
on:
  schedule:
    - cron: '17 6 * * 1,4'   # lundi et jeudi à 06h17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmb3d6cGJoY3dqcXhlcnNuaXVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5Mzk2NDgsImV4cCI6MjA5OTUxNTY0OH0.XfVhi5z0bkD_yM2D9zzPCCcRPGz3MxerOWIlgM5X_Yg"
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://efowzpbhcwjqxersniug.supabase.co/rest/v1/bus?select=code&limit=1" \
            -H "apikey: $ANON" -H "Authorization: Bearer $ANON")
          echo "HTTP $code"
          test "$code" = "200"
